<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NBA Playoffs 2026 — Or's Prediction Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a;--white:#fff;--off:#f5f5f5;--lgray:#e8e8e8;--mgray:#9a9a9a;--dgray:#2a2a2a;
  --gold:#c9a227;--goldl:#e6b830;--red:#c8102e;--east:#1d428a;--west:#c8102e;--green:#00a651;
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off);font-family:var(--fb);color:var(--black);overflow-x:hidden;-webkit-text-size-adjust:100%}

/* ── HERO ── */
.hero{background:var(--black);position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% 120%,rgba(29,66,138,.35) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 20% 50%,rgba(200,16,46,.18) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 80% 50%,rgba(201,162,39,.15) 0%,transparent 50%);pointer-events:none}
.hero-lines{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,#fff 59px,#fff 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,#fff 59px,#fff 60px);pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2rem 1.5rem 1.75rem;display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:2px;padding:5px 16px;font-family:var(--fd);font-size:12px;letter-spacing:3px;color:var(--goldl);text-transform:uppercase;margin-bottom:1rem}
.lpulse{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
/* Title: just logo + PLAYOFFS 2026 */
.hero-title{display:flex;flex-direction:column;align-items:center;gap:0;margin-bottom:.5rem;line-height:1}
.hero-top{display:flex;align-items:center;justify-content:center;gap:12px;line-height:1}
.hero-logo{height:clamp(3.5rem,8vw,6.5rem);width:auto;object-fit:contain;filter:drop-shadow(0 2px 16px rgba(255,255,255,.25))}
.hero-bot{font-family:'Anton',var(--fd);font-size:clamp(3.5rem,8vw,6.5rem);color:var(--white);line-height:1;letter-spacing:3px;text-transform:uppercase}
.hero-sub{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:1.25rem}
.hero-sub strong{color:var(--goldl)}
.hero-sync{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,.5)}
.cdot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;transition:background .4s}
.cdot.on{background:#22c55e}

/* ── NAV ── */
.nav-wrap{background:var(--black);border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:200}
.nav{max-width:1200px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1rem;justify-content:space-around}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;padding:13px 10px;font-family:var(--fd);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.45);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.nav-btn:hover{color:rgba(255,255,255,.8)}
.nav-btn.act{color:var(--goldl);border-bottom-color:var(--goldl)}

.content{max-width:1200px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* ── SECTION HDR ── */
.sec-hdr{margin-bottom:1.25rem;padding-bottom:.85rem;border-bottom:3px solid var(--black)}
.sec-title{font-family:var(--fd);font-size:1.9rem;letter-spacing:2px;text-transform:uppercase;color:var(--black)}
.rnd-ttl{font-family:var(--fd);font-size:1.2rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--black);margin-bottom:.75rem;margin-top:1.5rem;display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--black);padding-bottom:.4rem;flex-wrap:wrap;gap:4px}
.rnd-pts{font-size:.7rem;letter-spacing:.5px;color:var(--mgray);font-family:var(--fb);font-weight:400;text-transform:uppercase;text-align:right}
.rnd-ttl:first-of-type{margin-top:0}
.rnd-pts{font-size:.75rem;letter-spacing:.5px;color:var(--mgray);font-family:var(--fb);font-weight:400;text-transform:uppercase}

/* ── CONF BANNERS ── */
.conf-banner{display:flex;align-items:center;gap:10px;margin-bottom:.6rem;margin-top:.8rem}
.cb-e{width:26px;height:26px;background:var(--east);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;color:#fff;flex-shrink:0}
.cb-w{width:26px;height:26px;background:var(--west);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:10px;color:#fff;flex-shrink:0}
.cb-name{font-family:var(--fd);font-size:1rem;letter-spacing:3px;text-transform:uppercase;color:var(--black)}
.cb-line{flex:1;height:1px;background:var(--lgray)}

/* ── MATCHUP CARD ── */
.mcard{background:var(--white);border:1px solid var(--lgray);border-radius:4px;margin-bottom:10px;overflow:hidden;position:relative;transition:box-shadow .2s}
.mcard:hover{box-shadow:0 6px 24px rgba(0,0,0,.1)}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--t1c,#333),var(--t2c,#666))}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 7px 18px;border-bottom:1px solid var(--lgray);background:#fafafa;gap:6px;flex-wrap:wrap}
.card-lbl{font-family:var(--fd);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mgray)}
.card-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stag{font-family:var(--fd);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:2px}
.st-s{background:#f0f0f0;color:#666}
.st-l{background:#fee2e2;color:var(--red)}
.st-d{background:#dcfce7;color:#16a34a}
.countdown{font-family:var(--fd);font-size:11px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;white-space:nowrap}
.countdown.urg{color:var(--red);animation:up 1s ease-in-out infinite}
@keyframes up{0%,100%{opacity:1}50%{opacity:.6}}
.ltag{font-family:var(--fd);font-size:10px;letter-spacing:1.5px;color:#92400e;background:#fef3c7;padding:3px 8px;border-radius:2px}
/* team rows */
.teams-area{padding:0 12px 0 18px}
.tbtn{display:flex;align-items:center;gap:10px;padding:12px 8px;width:100%;background:none;border:2px solid transparent;border-radius:3px;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;user-select:none;margin-bottom:3px}
.tbtn:hover:not(:disabled){background:rgba(0,0,0,.025)}
.tbtn:disabled{cursor:not-allowed}
.tbtn.picked{background:rgba(201,162,39,.06);border-color:var(--gold)}
.tbtn.correct{background:rgba(0,166,81,.06);border-color:var(--green)}
.tbtn.wrong{background:rgba(200,16,46,.04);border-color:#e5e5e5;opacity:.7}
.tl{border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:1px solid #e8e8e8}
.tl img{object-fit:contain;display:block;opacity:0;transition:opacity .3s}
.tl img.ld{opacity:1}
.tl-fb{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fd);color:#fff}
.tseed{font-family:var(--fd);font-size:11px;color:var(--mgray);width:14px;text-align:center;flex-shrink:0}
.tname{flex:1;font-family:var(--fd);font-size:1.2rem;letter-spacing:1px;text-transform:uppercase;color:var(--black)}
.twins{font-family:'Anton',var(--fd);font-size:2rem;color:#ccc;min-width:20px;text-align:right;line-height:1}
.twins.ld{color:var(--black)}
.twins.won{color:var(--gold)}
.vs-row{display:flex;align-items:center;padding:2px 8px;gap:0}
.vs-line{flex:1;height:1px;background:var(--lgray)}
.vs-lbl{font-family:var(--fd);font-size:10px;letter-spacing:3px;color:#bbb;padding:0 10px}
/* card footer */
.cftr{display:flex;align-items:center;gap:10px;padding:8px 16px 12px;flex-wrap:wrap}
.slbl{font-size:11px;color:var(--mgray);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.ssel{padding:5px 9px;background:var(--off);border:1px solid var(--lgray);border-radius:3px;font-family:var(--fb);font-size:12px;color:var(--black);cursor:pointer;width:auto}
.ssel:disabled{cursor:not-allowed;opacity:.6}
.udog{font-size:11px;color:var(--mgray);margin-left:auto}
/* badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:2px;font-family:var(--fd);font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.bg{background:#fefce8;color:var(--gold);border:1px solid #fde04444}
.bgr{background:#f0fdf4;color:#16a34a;border:1px solid #86efac44}
.brd{background:#fff1f2;color:var(--red);border:1px solid #fca5a544}
.bgy{background:#f5f5f5;color:#888;border:1px solid #e5e5e5}

/* ── USER BAR + SAVE ── */
.ubar{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;flex-wrap:wrap}
.ulbl{font-family:var(--fd);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);white-space:nowrap}
.usel{font-family:var(--fd);font-size:15px;letter-spacing:1px;text-transform:uppercase;padding:9px 14px;background:var(--white);border:2px solid var(--black);border-radius:3px;color:var(--black);min-width:160px;cursor:pointer;width:auto;-webkit-appearance:auto}
.usel:focus{outline:none;border-color:var(--gold)}
.save-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;background:var(--black);color:var(--white);font-family:var(--fd);font-size:14px;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;transition:background .2s;margin-left:auto}
.save-btn:hover{background:#333}
.save-hint{font-size:12px;color:var(--mgray)}
/* pts bar */
.pbar{background:var(--black);color:rgba(255,255,255,.6);border-radius:3px;padding:.75rem 1rem;margin-bottom:1.25rem;font-size:11px;line-height:1.9;letter-spacing:.5px;display:flex;flex-wrap:wrap;gap:0 18px;align-items:center}
.pbar strong{color:var(--goldl);font-weight:600}
.pbar-lbl{font-family:var(--fd);font-size:12px;letter-spacing:2px;color:var(--goldl);margin-right:6px}

/* ── BONUS TAB ── */
.bonus-card{background:var(--black);border-radius:4px;padding:1.5rem;margin-bottom:12px;position:relative;overflow:hidden}
.bonus-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--goldl),var(--gold))}
.bonus-lbl{font-family:var(--fd);font-size:1.3rem;letter-spacing:2px;text-transform:uppercase;color:var(--white);margin-bottom:.35rem}
.bonus-desc{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:1.1rem}
.bsel{padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:3px;font-family:var(--fd);font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--white);cursor:pointer;max-width:320px;width:100%}
.bsel:focus{outline:none;border-color:var(--gold)}
.bsel option{background:#1a1a1a;color:#fff}
.binput{padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:3px;font-family:var(--fb);font-size:14px;color:var(--white);max-width:320px;width:100%}
.binput::placeholder{color:rgba(255,255,255,.3)}
.binput:focus{outline:none;border-color:var(--gold)}
.bpick{margin-top:.7rem;font-size:13px;color:rgba(255,255,255,.5)}
.bpick strong{color:var(--goldl)}
.odds-ttl{font-family:var(--fd);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin:1rem 0 .6rem}
.odds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.odds-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:3px;padding:.5rem .8rem;display:flex;align-items:center;gap:8px}
.odds-name{font-size:12px;color:rgba(255,255,255,.7);flex:1}
.odds-pts{font-family:var(--fd);font-size:17px;color:var(--goldl)}
.locked-ban{background:rgba(200,16,46,.07);border:1px solid rgba(200,16,46,.2);border-radius:3px;padding:.75rem 1rem;font-size:13px;color:var(--red);display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.unlock-note{font-size:13px;color:var(--mgray);padding:.5rem 0 .25rem}
.mvp-locked{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:1.25rem 1.5rem;margin-bottom:12px;color:rgba(255,255,255,.4);font-size:13px;font-style:italic}

/* ── STANDINGS — MOBILE FIRST ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:500px){.stat-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--black);color:var(--white);border-radius:4px;padding:1rem .75rem;text-align:center}
.stat-val{font-family:'Anton',var(--fd);font-size:2.2rem;color:var(--goldl);line-height:1;word-break:break-all}
.stat-lbl{font-family:var(--fd);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:5px}
/* Standings: card list on mobile, table on desktop */
.lb-wrap{background:var(--white);border:1px solid var(--lgray);border-radius:4px;overflow:hidden}
/* Mobile card view (hidden on desktop) */
.lb-cards{display:none}
.lb-row-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--lgray)}
.lb-row-card:last-child{border-bottom:none}
.lb-row-card:hover{background:#fafafa}
.rank-b{width:30px;height:30px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;flex-shrink:0}
.r1{background:var(--gold);color:#000}
.r2{background:#c0c0c0;color:#000}
.r3{background:#cd7f32;color:#fff}
.rn{background:#e8e8e8;color:#666}
.lb-card-name{font-family:var(--fd);font-size:16px;letter-spacing:.5px;color:var(--black);flex:1}
.lb-card-total{font-family:'Anton',var(--fd);font-size:24px;color:var(--black);min-width:32px;text-align:right}
.lb-card-detail{font-size:11px;color:var(--mgray);margin-top:2px}
/* Desktop table view (hidden on mobile) */
.lb-table-wrap{overflow-x:auto}
.lb-tbl{width:100%;border-collapse:collapse;table-layout:auto}
.lb-tbl th{padding:9px 8px;font-family:var(--fd);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);border-bottom:2px solid var(--black);text-align:center;background:var(--off);white-space:nowrap}
.lb-tbl th:nth-child(2){text-align:left;padding-left:10px}
.lb-tbl td{padding:12px 8px;border-bottom:1px solid var(--lgray);text-align:center;font-size:13px;color:var(--dgray);white-space:nowrap}
.lb-tbl td:nth-child(2){text-align:left;padding-left:10px}
.lb-tbl tr:last-child td{border-bottom:none}
.lb-tbl tr:hover td{background:#fafafa}
.lb-tot{font-family:'Anton',var(--fd);font-size:20px}
.lb-name{font-family:var(--fd);font-size:14px;letter-spacing:.5px;color:var(--black)}
@media(max-width:600px){
  .lb-cards{display:block}
  .lb-table-wrap{display:none}
}
@media(min-width:601px){
  .lb-cards{display:none}
  .lb-table-wrap{display:block}
}

/* ── BRACKET+SCHEDULE ── */
.series-block{background:var(--white);border:1px solid var(--lgray);border-radius:4px;margin-bottom:12px;overflow:hidden}
.series-header{background:var(--black);padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;flex-wrap:wrap}
.series-header:hover{background:#111}
.sh-teams{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.sh-vs{font-family:var(--fd);font-size:.95rem;letter-spacing:2px;text-transform:uppercase;color:var(--white)}
.sh-score{font-family:'Anton',var(--fd);font-size:1.3rem;color:var(--goldl);margin-left:4px}
.sh-status{font-family:var(--fd);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:2px}
.sh-done{background:rgba(0,166,81,.2);color:#4ade80}
.sh-live{background:rgba(200,16,46,.2);color:#f87171}
.sh-sched{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.sh-chevron{font-size:16px;color:rgba(255,255,255,.5);transition:transform .3s;flex-shrink:0}
.sh-chevron.open{transform:rotate(180deg)}
/* spoiler toggle */
.spoiler-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-family:var(--fd);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap}
.spoiler-btn:hover{background:rgba(255,255,255,.15)}
/* series body */
.series-body{display:none}
.series-body.open{display:block}
/* bkt mini teams */
.bkt-teams{display:flex;gap:0;border-bottom:1px solid var(--lgray)}
.bkt-side{flex:1;padding:12px 16px;display:flex;align-items:center;gap:8px}
.bkt-side.winner-side{background:#fffbeb}
.bkt-seed{font-family:var(--fd);font-size:11px;color:var(--mgray);width:13px;flex-shrink:0}
.bkt-tname{font-family:var(--fd);font-size:1rem;letter-spacing:1px;text-transform:uppercase;color:var(--black);flex:1}
.bkt-sc{font-family:'Anton',var(--fd);font-size:1.4rem;color:#ccc;min-width:16px;text-align:right}
.bkt-sc.ld{color:var(--black)}
.bkt-sc.won{color:var(--gold)}
.bkt-mid{display:flex;align-items:stretch;flex-direction:column;justify-content:center;padding:0 10px;border-left:1px solid var(--lgray);border-right:1px solid var(--lgray);background:#fafafa}
.bkt-vs{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:#bbb;writing-mode:horizontal-tb}
/* games list */
.games-list{padding:0}
.game-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--lgray);flex-wrap:wrap}
.game-item:last-child{border-bottom:none}
.gi-num{font-family:var(--fd);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mgray);min-width:54px;flex-shrink:0}
.gi-info{flex:1;min-width:0}
.gi-date{font-size:13px;color:var(--dgray);font-weight:500}
.gi-venue{font-size:11px;color:var(--mgray);margin-top:1px}
.gi-score{font-family:'Anton',var(--fd);font-size:1.2rem;color:var(--black);min-width:70px;text-align:center;flex-shrink:0}
.gi-score.hidden-score{filter:blur(6px);cursor:pointer;transition:filter .3s}
.gi-score.hidden-score:hover{filter:blur(2px)}
/* Spoiler shield via body class — works on already-open series without re-render */
body.spoiler-on .gi-score.ld{filter:blur(6px);cursor:pointer;transition:filter .3s}
body.spoiler-on .gi-score.ld:hover{filter:blur(2px)}
body.spoiler-on .bkt-sc.ld{filter:blur(6px);transition:filter .3s}
body.spoiler-on .bkt-sc.won{filter:blur(6px);transition:filter .3s}
body.spoiler-on .gi-score.ld::after{content:'';display:none}
/* Individual revealed scores bypass spoiler shield */
.gi-score.score-revealed,.bkt-sc.score-revealed{filter:none!important;cursor:default}
.gi-links{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
/* YouTube embed */
.yt-embed-wrap{width:100%;background:#000;border-radius:4px;overflow:hidden;margin-top:8px;position:relative;padding-bottom:56.25%}
.yt-embed-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.yt-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.yt-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:3px;font-family:var(--fd);font-size:11px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:background .2s;white-space:nowrap;cursor:pointer;border:none}

function curR(){return(S.rounds&&S.rounds.length)?S.rounds:ROUNDS;}
function isUD(m,w){return!!(m.s1&&m.s2&&w===m.t2);}
function gsv(mid){return(S.results&&S.results[mid]&&S.results[mid].seriesScore)?S.results[mid].seriesScore:'';}
// Parse stored seriesScore (e.g. "1-0 Magic") into just numbers ordered as t1-t2
// t1 is always the higher seed (home team in game 1)
// If the winner name matches t2, flip the numbers
function serScoreNums(mid,t1,t2){
  // Strip team name from stored score like "0-1 Magic" or "1-0 Celtics"
  // The numbers are already in t1-t2 order (t1 wins first, t2 wins second)
  var raw=gsv(mid);if(!raw)return'';
  var m=raw.match(/(\d+)-(\d+)/);if(!m)return'';
  return m[1]+'-'+m[2];
}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function isLocked(mid){var res=S.results&&S.results[mid];if(res&&res.winner)return true;var to=TIPOFFS[mid];if(!to)return false;return Date.now()>=to.getTime();}
function cdStr(mid){var to=TIPOFFS[mid];if(!to)return null;var d=to.getTime()-Date.now();if(d<=0)return null;var dy=Math.floor(d/86400000),h=Math.floor((d%86400000)/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);var urg=d<3600000;var str=dy>0?dy+'d '+h+'h '+m+'m':h>0?h+'h '+m+'m '+s+'s':m+'m '+s+'s';return{str:str,urg:urg};}
function tofLbl(mid){var to=TIPOFFS[mid];if(!to)return'Apr 18';try{return to.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'Asia/Jerusalem'})+' IL';}catch(e){return'Apr 18';}}

// Logo helpers — 3 sizes
function tlg(name,sz,cls){

  var url=LOGOS[name],ab=ABBR[name]||(name?name.substring(0,3).toUpperCase():'?'),bg=COLORS[name]||'#444';
  var iSz=Math.round(sz*.76),uid='lg_'+Math.random().toString(36).substr(2,6);
  if(!url)return'<div class="'+cls+'-fb" style="width:'+sz+'px;height:'+sz+'px;min-width:'+sz+'px;background:'+bg+';font-size:'+Math.round(sz*.29)+'px">'+ab+'</div>';
  return'<div class="'+cls+'" style="width:'+sz+'px;height:'+sz+'px;min-width:'+sz+'px"><img id="'+uid+'" src="'+url+'" width="'+iSz+'" height="'+iSz+'" alt="'+name+'" onload="var e=document.getElementById(\''+uid+'\');if(e)e.className=\'ld\'" onerror="var p=this.parentElement;p.className=\''+cls+'-fb\';p.style.cssText=\'width:'+sz+'px;height:'+sz+'px;min-width:'+sz+'px;background:'+bg+';font-size:'+Math.round(sz*.29)+'px\';p.textContent=\''+ab+'\'"></div>';
}

function calcSc(p){
  var pk=(S.picks&&S.picks[p])?S.picks[p]:{},pm=cmap(S.customOddsOverride||{});
  var tot=0,r=[0,0,0,0],ch=0,mv=0,wins=0,bullseyes=0;
  curR().forEach(function(rnd,ri){rnd.matchups.forEach(function(m){var pk2=pk[m.id]||{},res=(S.results&&S.results[m.id])?S.results[m.id]:null;if(!res||!res.winner||!pk2.winner)return;if(pk2.winner===res.winner){var exact=String(pk2.games)===String(res.games);var pts=exact?rnd.exactPts:rnd.winPts;if(rnd.underdog&&isUD(m,res.winner))pts+=2;r[ri]+=pts;tot+=pts;wins++;if(exact)bullseyes++;}});});
  var cp=pk.champion,ac=(S.results&&S.results.champion)?S.results.champion:'';
  if(cp&&ac&&cp.toLowerCase().trim()===ac.toLowerCase().trim()){var b=pm[cp]!==undefined?pm[cp]:8;ch=b;tot+=b;}
  var mvpP=pk.mvp,mvpA=(S.results&&S.results.mvpActual)?S.results.mvpActual:'';
  if(mvpP&&mvpA&&mvpP.toLowerCase().trim()===mvpA.toLowerCase().trim()){mv=2;tot+=2;}
  var co=(S.pointCorrections&&S.pointCorrections[p])?Number(S.pointCorrections[p]):0;tot+=co;
  return{name:p,total:tot,r:r,champ:ch,mvp:mv,corr:co,wins:wins,bullseyes:bullseyes};
}

function mkCard(m,rnd,pk,user){

function toggleSpoiler(){
  spoilerHide=!spoilerHide;
  saveSpoiler(spoilerHide);
  // Apply/remove body class for instant CSS-based hiding (works on open series)
  document.body.classList.toggle('spoiler-on', spoilerHide);
  // Re-render whichever tab is currently active (updates button state + series headers)
  if(curTab==='picks')renderPicks();
  else if(curTab==='allpicks')renderAllPicks();
  else renderBracket();
}
function toggleSeries(id){var b=document.getElementById('sb-'+id),ch=document.getElementById('ch-'+id);if(!b)return;var isOpen=b.classList.contains('open');b.classList.toggle('open',!isOpen);if(ch)ch.classList.toggle('open',!isOpen);}
function revealScore(el){
  el.classList.remove('hidden-score');
  // Also override the body.spoiler-on CSS by adding an explicit class
  el.classList.add('score-revealed');
}
function toggleEmbed(id){
  var el=document.getElementById('embed-'+id);
  if(!el)return;
  var open=el.style.display!=='none';
  // Close all other embeds in same game-item to avoid stacking
  if(!open){
    var parent=el.closest('.game-item');
    if(parent){parent.querySelectorAll('[id^="embed-"]').forEach(function(e){e.style.display='none';});}
  }
  el.style.display=open?'none':'block';
}

function seriesBlock(m,rnd){
  var res=(S.results&&S.results[m.id])?S.results[m.id]:{};
  var sv=gsv(m.id);
  var t1=m.t1,t2=m.t2;
  var done=!!res.winner,live=!!(sv&&!done);
  var w1=sv?parseInt(sv.split('-')[0]):null,w2=sv?parseInt(sv.split('-')[1]||0):null;
  var s1cls='bkt-sc'+(res.winner===t1?' won':sv?' ld':'');
  var s2cls='bkt-sc'+(res.winner===t2?' won':sv?' ld':'');
  // status badge
  var stBadge=done?'<span class="sh-status sh-done">&#x2713; '+res.winner+'</span>':live?'':'';

  var h='<div class="series-block">';
  // Clickable header
  h+='<div class="series-header" onclick="toggleSeries(\''+m.id+'\')">';
  h+='<div class="sh-teams">';
  h+=tlg(t1,26,'tl')+'<span class="sh-vs" style="margin-left:6px">'+t1+'</span>';
  h+='<span class="sh-vs" style="padding:0 8px;opacity:.4">vs</span>';
  h+=tlg(t2,26,'tl')+'<span class="sh-vs" style="margin-left:6px">'+t2+'</span>';
  if(sv){
    if(spoilerHide){
      h+='<span class="sh-score" style="font-size:11px;opacity:.5">&#x1F648;</span>';
    }else{
      var svNums=serScoreNums(m.id,t1,t2);
      h+='<span class="sh-score">'+svNums+'</span>';
    }
  }
  h+='</div>';
  h+=stBadge;
  h+='<span class="sh-chevron" id="ch-'+m.id+'">&#x25BE;</span>';
  h+='</div>';

  // Collapsible body
  h+='<div class="series-body" id="sb-'+m.id+'">';
  // Mini bracket scores
  h+='<div class="bkt-teams">';
  h+='<div class="bkt-side'+(res.winner===t1?' winner-side':'')+'">'+tlg(t1,28,'tl')+'<span class="bkt-seed">'+(m.s1||'')+'</span><span class="bkt-tname">'+t1+'</span><span class="'+s1cls+'">'+(w1!==null?w1:'')+'</span></div>';
  h+='<div class="bkt-mid"><span class="bkt-vs">VS</span></div>';
  h+='<div class="bkt-side'+(res.winner===t2?' winner-side':'')+'">'+tlg(t2,28,'tl')+'<span class="bkt-seed">'+(m.s2||'')+'</span><span class="bkt-tname">'+t2+'</span><span class="'+s2cls+'">'+(w2!==null?w2:'')+'</span></div>';
  h+='</div>';
  // Games list
  h+='<div class="games-list">';
  var schedGames=SCHED[m.id]||[];
  for(var gi=0;gi<7;gi++){
    var sg=schedGames[gi]||{};
    var ag=(S.schedule&&S.schedule[m.id]&&S.schedule[m.id][gi])||{};
    var sc=(S.gameScores&&S.gameScores[m.id+'_g'+gi])||{};
    var dateStr=ag.date||sg.d||'';
    var timeStr=ag.time||sg.t||'';
    var venueStr=ag.venue||sg.v||'';
    if(!dateStr)continue;
    var hasScore=!!(sc.score);
    var hasShort=!!(sc.ytShortId);

      }else{
        scoreDisp='<span class="gi-score ld">'+sc.score+'</span>';
      }
    }else{
      scoreDisp='<span class="gi-score" style="color:#ccc;font-size:12px">'+(gi===0?'Upcoming':'TBD')+'</span>';
    }
    // Game row
    h+='<div class="game-item" style="flex-wrap:wrap">';
    h+='<span class="gi-num">G'+(gi+1)+'</span>';

      }
      h+='</div>';
      // Embed containers (hidden by default, toggle on click)
      if(hasShort){
        h+='<div id="embed-'+m.id+'_g'+gi+'_short" style="display:none;width:100%;padding:0 16px 12px">';
        h+='<div class="yt-embed-wrap"><iframe src="https://www.youtube.com/embed/'+sc.ytShortId+'?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe></div>';
        h+='</div>';
      }
      if(hasLong){
        h+='<div id="embed-'+m.id+'_g'+gi+'_long" style="display:none;width:100%;padding:0 16px 12px">';
        h+='<div class="yt-embed-wrap"><iframe src="https://www.youtube.com/embed/'+sc.ytLongId+'?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe></div>';
        h+='</div>';
      }
    }else if(hasScore){
      h+='<div style="width:100%;padding-left:54px"><span class="tof-lbl">&#x23F3; Recaps syncing soon</span></div>';
    }
    h+='</div>'; // game-item
  }
  h+='</div></div></div>';
  return h;
}

// ── ADMIN PASSWORD GATE ──────────────────────────────────────────
function showAdminGate(){
  // Remove any existing gate
  var existing=document.getElementById('pwd-gate');if(existing)existing.remove();
  var gate=document.createElement('div');
  gate.id='pwd-gate';gate.className='pwd-gate';
  gate.innerHTML='<h2>&#x1F510; Admin Access</h2><p>Enter your PIN to continue</p>'+
    '<input class="pwd-input" id="pwd-in" type="password" inputmode="numeric" maxlength="10" placeholder="\u2022\u2022\u2022\u2022" onkeydown="if(event.key===\'Enter\')checkPin()">'+
    '<button class="pwd-btn" onclick="checkPin()">Enter</button>'+
    '<div class="pwd-err" id="pwd-err"></div>'+
    '<button onclick="document.getElementById(\'pwd-gate\').remove()" style="background:transparent;border:none;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;margin-top:8px">Cancel</button>';
  document.body.appendChild(gate);
  setTimeout(function(){var inp=document.getElementById('pwd-in');if(inp)inp.focus();},100);
}
function checkPin(){
  var inp=document.getElementById('pwd-in');
  var err=document.getElementById('pwd-err');
  if(!inp)return;
  var pin=S.adminPin||'1234';
  if(inp.value===pin){
    adminUnlocked=true;
    var gate=document.getElementById('pwd-gate');if(gate)gate.remove();
    showTab('admin');
  }else{
    if(err)err.textContent='Incorrect PIN. Try again.';
    inp.value='';inp.focus();
    inp.style.borderColor='var(--red)';
    setTimeout(function(){inp.style.borderColor='';if(err)err.textContent='';},2000);
  }
}

// ── ADMIN ─────────────────────────────────────────────────────────
function renderAdmin(){
  var el=document.getElementById('tab-admin');if(!el)return;
  var pm=cmap(S.customOddsOverride||{});
  var h='<div class="sec-hdr"><h2 class="sec-title">Admin</h2></div>';
  h+='<div class="adm-hdr">&#x1F510; Admin Mode &mdash; Changes sync live to all participants &mdash; <span onclick="adminUnlocked=false;showTab(\'picks\')" style="cursor:pointer;text-decoration:underline;opacity:.7">Lock admin</span></div>';

  // Change PIN
  h+='<div class="adm-sec"><div class="adm-ttl">Change Admin PIN</div>';
  h+='<div class="adm-row"><input class="ain" id="new-pin" type="password" style="max-width:200px" placeholder="New PIN" maxlength="20"><button class="btn-blk" onclick="changePin()">Save PIN</button></div></div>';

  // Participants
  h+='<div class="adm-sec"><div class="adm-ttl">Participants</div>';
  (S.participants||[]).forEach(function(p,i){h+='<div class="adm-row"><span style="flex:1;font-size:14px">'+p+'</span><button class="btn-rm" onclick="rmP('+i+')">Remove</button></div>';});
  h+='<div class="adm-row" style="margin-top:.6rem"><input id="new-p" class="ain" style="max-width:240px" placeholder="Add participant\u2026" onkeydown="if(event.key===\'Enter\')addP()"><button class="btn-blk" onclick="addP()">Add</button></div></div>';

  h+='<div class="adm-sec"><div class="adm-ttl">Edit Teams &amp; Matchups</div>';

    h+='</div>';
  });h+='</div>';

  // Results
  h+='<div class="adm-sec"><div class="adm-ttl">Series Results &amp; Live Scores</div>';
  h+='<p style="font-size:12px;color:#9a9a9a;margin-bottom:.85rem">Enter "3-1" for live score. Set winner + games when series ends.</p>';
  curR().forEach(function(rnd){
    h+='<div style="margin-bottom:.85rem"><span class="albl">'+rnd.label+'</span>';
    rnd.matchups.forEach(function(m){
      var res=(S.results&&S.results[m.id])?S.results[m.id]:{};
      h+='<div class="adm-row" style="margin-bottom:.4rem;flex-wrap:wrap"><span class="aspan">'+m.t1+' vs '+m.t2+'</span>';
      h+='<input class="ain" style="width:82px" placeholder="3-1" value="'+(res.seriesScore||'')+'" onchange="sRF(\''+m.id+'\',\'seriesScore\',this.value)">';
      h+='<select class="asel" style="width:140px" onchange="sR(\''+m.id+'\',\'winner\',this.value)"><option value="">Winner\u2026</option><option value="'+m.t1+'"'+(res.winner===m.t1?' selected':'')+'>'+m.t1+'</option><option value="'+m.t2+'"'+(res.winner===m.t2?' selected':'')+'>'+m.t2+'</option></select>';
      h+='<select class="asel" style="width:100px" onchange="sR(\''+m.id+'\',\'games\',this.value)"><option value="">Games\u2026</option>';
      [4,5,6,7].forEach(function(g){h+='<option value="'+g+'"'+(res.games==g?' selected':'')+'>'+g+'g</option>';});
      h+='</select></div>';
    });h+='</div>';
  });h+='</div>';

  // Champion
  h+='<div class="adm-sec"><div class="adm-ttl">Champion Bonus</div>';
  h+='<div class="adm-row" style="margin-bottom:.75rem"><span style="font-size:13px;color:#666">Lock picks:</span><button class="btn-out" onclick="tLk()">'+(S.champLocked?'&#x1F512; Locked':'&#x1F513; Unlocked')+'</button></div>';
  h+='<div class="adm-row" style="margin-bottom:.75rem"><span class="aspan">Actual champion:</span><input class="ain" style="max-width:180px" placeholder="e.g. Celtics" value="'+((S.results&&S.results.champion)?S.results.champion:'')+'" onchange="S.results.champion=this.value;save(\'Saved\')"></div>';
  h+='<span class="albl">Override bonus pts per team</span>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-top:.5rem">';
  Object.keys(pm).sort(function(a,b){return pm[a]-pm[b];}).forEach(function(t){
    var ov=(S.customOddsOverride&&S.customOddsOverride[t]!==undefined)?S.customOddsOverride[t]:'';
    h+='<div class="aoi">'+tlg(t,22,'tl')+'<span style="flex:1;font-size:12px;margin-left:6px">'+t+'</span><span style="font-family:var(--fd);font-size:15px;color:var(--gold);margin-right:6px">'+pm[t]+'</span><input type="number" min="1" max="15" class="ain" style="width:48px;padding:4px 6px;text-align:center" placeholder="ovr" value="'+ov+'" onchange="sOv(\''+esc(t)+'\',this.value)"></div>';
  });h+='</div></div>';

  // Finals MVP
  h+='<div class="adm-sec"><div class="adm-ttl">Finals MVP</div>';
  var fr=(S.results&&S.results.finals)?S.results.finals:{};
  h+='<div class="adm-row" style="margin-bottom:.4rem"><span class="aspan">Finals Team 1 (East):</span><input class="ain" style="max-width:180px" value="'+(fr.t1||'')+'" onchange="sRF(\'finals\',\'t1\',this.value)"></div>';
  h+='<div class="adm-row" style="margin-bottom:.4rem"><span class="aspan">Finals Team 2 (West):</span><input class="ain" style="max-width:180px" value="'+(fr.t2||'')+'" onchange="sRF(\'finals\',\'t2\',this.value)"></div>';
  h+='<div class="adm-row"><span class="aspan">Actual MVP:</span><input class="ain" style="max-width:180px" placeholder="Player name" value="'+((S.results&&S.results.mvpActual)?S.results.mvpActual:'')+'" onchange="S.results.mvpActual=this.value;save(\'Saved\')"></div></div>';

  // Game scores & recap links (incl. YouTube)
  h+='<div class="adm-sec"><div class="adm-ttl">Game Scores &amp; Recap Links</div>';
  h+='<p style="font-size:12px;color:#9a9a9a;margin-bottom:.85rem">Enter scores, NBA.com recap URL, and YouTube full-game recap URL for each game.</p>';
  curR().forEach(function(rnd){rnd.matchups.forEach(function(m){
    h+='<div style="margin-bottom:1rem"><span class="albl">'+m.t1+' vs '+m.t2+' ('+rnd.label+')</span>';
    for(var gi=0;gi<7;gi++){
      var sc=(S.gameScores&&S.gameScores[m.id+'_g'+gi])||{};
      h+='<div class="adm-row" style="margin-bottom:.25rem;align-items:flex-start">';
      h+='<span style="font-size:10px;color:#aaa;min-width:22px;font-family:var(--fd);letter-spacing:1px;padding-top:10px">G'+(gi+1)+'</span>';
      h+='<div style="display:flex;flex-direction:column;gap:4px;flex:1">';
      h+='<input class="ain" style="width:100%" placeholder="Score (e.g. Pistons 108, Magic 97)" value="'+(sc.score||'')+'" onchange="sSF(\''+m.id+'\','+gi+',\'score\',this.value)">';
      h+='<input class="ain" style="width:100%;background:#fffbeb" placeholder="Short recap YouTube Video ID (auto-synced)" value="'+(sc.ytShortId||'')+'" onchange="sSF(\''+m.id+'\','+gi+',\'ytShortId\',this.value)">';
      h+='<input class="ain" style="width:100%;background:#fffbeb" placeholder="Full highlights YouTube Video ID (auto-synced)" value="'+(sc.ytLongId||'')+'" onchange="sSF(\''+m.id+'\','+gi+',\'ytLongId\',this.value)">';
      h+='</div></div>';
    }h+='</div>';
  });});h+='</div>';

  // Override any participant pick post-tipoff
  h+='<div class="adm-sec"><div class="adm-ttl">Override Participant Picks</div>';
  h+='<p style="font-size:12px;color:#9a9a9a;margin-bottom:.85rem">Edit any pick for any participant even after series is locked.</p>';
  var admUs=(S.participants&&S.participants[0])||'';
  h+='<div class="adm-row" style="margin-bottom:.85rem"><span class="aspan">Participant:</span>';
  h+='<select class="asel" id="adm-p-sel" style="min-width:170px" onchange="renderAdmPicks()">'+( S.participants||[]).map(function(p){return'<option value="'+p+'">'+p+'</option>';}).join('')+'</select></div>';
  h+='<div id="adm-picks-area"></div>';
  h+='</div>';

  // Point corrections
  h+='<div class="adm-sec"><div class="adm-ttl">Point Corrections</div>';
  (S.participants||[]).forEach(function(p){
    var co=(S.pointCorrections&&S.pointCorrections[p])?S.pointCorrections[p]:'';
    h+='<div class="adm-row" style="margin-bottom:.3rem"><span style="flex:1;font-size:14px">'+p+'</span><input type="number" class="ain" style="width:68px;text-align:center" placeholder="0" value="'+co+'" onchange="sCo(\''+esc(p)+'\',this.value)"><span style="font-size:12px;color:#aaa">pts</span></div>';
  });h+='</div>';
  el.innerHTML=h;
  renderAdmPicks();

function renderAdmPicks(){
  var sel=document.getElementById('adm-p-sel');
  var area=document.getElementById('adm-picks-area');
  if(!sel||!area)return;
  var user=sel.value;
  var pk=(S.picks&&S.picks[user])?S.picks[user]:{};
  var h='';
  curR().forEach(function(rnd){
    if(!rnd.underdog&&rnd.matchups[0]&&!rnd.matchups[0].s1)return; // skip abstract rounds for override
    rnd.matchups.forEach(function(m){
      if(!m.t1||m.t1.indexOf('winner')!==-1)return;
      var pick=pk[m.id]||{};
      var gOpts='<option value="">— Series Bet —</option>';['4','5','6','7'].forEach(function(g){gOpts+='<option value="'+g+'"'+(String(pick.games)===g?' selected':'')+'>4\u2013'+(parseInt(g)-4)+'</option>';});
      h+='<div class="adm-row" style="margin-bottom:.35rem;flex-wrap:wrap"><span class="aspan" style="min-width:160px">'+m.t1+' vs '+m.t2+'</span>';
      h+='<select class="asel" style="width:130px" onchange="admSetPick(\''+esc(user)+'\',\''+m.id+'.winner\',this.value)">';
      h+='<option value="">Winner\u2026</option>';
      h+='<option value="'+m.t1+'"'+(pick.winner===m.t1?' selected':'')+'>'+m.t1+'</option>';
      h+='<option value="'+m.t2+'"'+(pick.winner===m.t2?' selected':'')+'>'+m.t2+'</option>';
      h+='</select>';
      h+='<select class="asel" style="width:110px" onchange="admSetPick(\''+esc(user)+'\',\''+m.id+'.games\',this.value)">'+gOpts+'</select>';
      h+='</div>';
    });
  });
  area.innerHTML=h||'<p style="font-size:13px;color:#aaa">Select a participant above to edit their picks.</p>';
}
function admSetPick(user,field,value){setP(user,field,value);}

// ── ADMIN HELPERS ─────────────────────────────────────────────────
function eT(ri,mi,f,v){if(!S.rounds)S.rounds=JSON.parse(JSON.stringify(ROUNDS));S.rounds[ri].matchups[mi][f]=v;save('Team updated');}
function sR(id,f,v){if(!S.results)S.results={};if(!S.results[id])S.results[id]={};S.results[id][f]=v;save('Saved');}
function sRF(id,f,v){sR(id,f,v);}
function sSF(mid,gi,f,v){if(!S.gameScores)S.gameScores={};var k=mid+'_g'+gi;if(!S.gameScores[k])S.gameScores[k]={};S.gameScores[k][f]=v;save('Saved');}
function sOv(t,v){if(!S.customOddsOverride)S.customOddsOverride={};if(!v)delete S.customOddsOverride[t];else S.customOddsOverride[t]=parseInt(v);save('Saved');}
function sCo(p,v){if(!S.pointCorrections)S.pointCorrections={};S.pointCorrections[p]=parseFloat(v)||0;save('Saved');}
function tLk(){S.champLocked=!S.champLocked;save(S.champLocked?'Picks locked!':'Picks unlocked');renderAdmin();}
function addP(){var inp=document.getElementById('new-p');var n=(inp&&inp.value||'').trim();if(!n||(S.participants||[]).includes(n))return;if(!S.participants)S.participants=[];S.participants.push(n);save('Added '+n);inp.value='';renderAdmin();}
function rmP(i){var n=S.participants[i];S.participants.splice(i,1);if(S.picks)delete S.picks[n];save('Removed '+n);renderAdmin();}
function changePin(){var inp=document.getElementById('new-pin');var v=(inp&&inp.value||'').trim();if(!v){toast('Enter a PIN');return;}S.adminPin=v;save('PIN updated!');inp.value='';}
